<div id="chat-container" style="padding:15px; background:#fff; height:400px; display:flex; flex-direction:column;">
    <div id="chat-window" style="flex:1; overflow-y:auto; margin-bottom:10px; border:1px solid #eee; padding:10px; font-size:14px;">
        협회 AI 상담사가 연결되었습니다. 질문을 입력해주세요.
    </div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="user-input" style="flex:1; padding:8px;" placeholder="질문을 입력하세요...">
        <button onclick="sendMsg()" style="padding:8px 15px; background:#004a95; color:#fff; border:none; cursor:pointer;">질문하기</button>
    </div>
</div>

<script>
async function sendMsg() {
    const input = document.getElementById('user-input');
    const window = document.getElementById('chat-window');
    const msg = input.value;
    if(!msg) return;

    window.innerHTML += `<div style="margin-top:10px; color:blue;"><b>나:</b> ${msg}</div>`;
    window.innerHTML += `<div id="loading" style="color:gray;">생각 중...</div>`;
    input.value = '';

    const response = await fetch('https://genai-app-rd-1-808470621871.us-central1.run.app/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
    });
    const data = await response.json();
    document.getElementById('loading').remove();
    window.innerHTML += `<div style="margin-top:10px; background:#f9f9f9; padding:5px;"><b>AI:</b> ${data.answer}</div>`;
    window.scrollTop = window.scrollHeight;
}
</script>
