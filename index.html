    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px 0; }
        .container { text-align: center; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 600px; overflow: hidden; margin-bottom: 50px; }

        .full-img { width: 100%; height: auto; display: block; border: none; }
        .project-banner { margin: 15px 0; border-radius: 12px; transition: transform 0.2s; overflow: hidden; display: block; }
        .project-banner:hover { transform: scale(1.01); filter: brightness(1.05); }
        .content-box { padding: 30px 20px; }
        h1 { color: #2c3e50; font-size: 18px; line-height: 1.6; margin-bottom: 25px; word-break: keep-all; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 16px; margin: 12px 0; border: none; border-radius: 12px; color: white; text-decoration: none; font-weight: bold; transition: transform 0.2s; cursor: pointer; font-size: 16px; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-notice { background-color: #f39c12; margin-bottom: 25px !important; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3); } 
        .btn-cafe { background-color: #3498db; }
        .btn-youtube { background-color: #e74c3c; }
        .sub-btn-row { display: flex; gap: 12px; margin-top: 15px; justify-content: center; }
        .btn-sub { flex: 1; margin: 0 !important; padding: 14px 10px !important; font-size: 14px !important; }
        .btn-gift { background-color: #00b8d4; } 
        .btn-gw { background-color: #4a90e2; }   
        .icon { margin-right: 8px; font-size: 18px; }
        .divider { margin: 25px 0 20px 0; border-top: 1px solid #eee; }
        .footer { background-color: #f9fafb; padding: 30px 20px; border-top: 1px solid #eee; color: #7f8c8d; font-size: 12px; line-height: 1.8; text-align: center; }
        .footer p { margin: 5px 0; word-break: keep-all; }
        .footer-line { margin: 0 8px; color: #ccc; }
        .copyright { margin-top: 15px !important; color: #bdc3c7; font-weight: bold; }

        /* 챗봇 스타일 수정 */
        #chat-circle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #004a95; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        #chat-box { position: fixed; bottom: 90px; right: 20px; width: 350px; height: 500px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; z-index: 1000; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://kotera8520.github.io/kotera" class="img-link"><img src="logo.jpg" class="full-img"></a>
        <a href="https://kotera8520.github.io/kotera" class="img-link"><img src="men.gif" class="full-img"></a>
        <a href="https://cafe.daum.net/policyfund" class="img-link"><img src="jsm.jpg" class="full-img"></a>
        <div class="content-box">
            <h1>사단법인 한국기술개발협회에 오신 것을 환영합니다.</h1>
            <a href="https://cafe.daum.net/policyfund/HhFz" class="btn btn-notice" target="_blank"><span class="icon">📢</span>실시간 주요 공지사항 확인</a>
            <a href="https://cafe.daum.net/policyfund" class="btn btn-cafe" target="_blank"><span class="icon">🏠</span>◈정실미◈ 다음카페 바로가기</a>
            <a href="https://www.youtube.com/@kotera8520" class="btn btn-youtube" target="_blank"><span class="icon">📺</span>KOTERA TV</a>
            <a href="https://cafe.daum.net/policyfund/HhFz/796" class="project-banner" target="_blank"><img src="7.png" class="full-img"></a>
            <a href="https://cafe.daum.net/policyfund/7GAA/968" class="project-banner" target="_blank"><img src="help.gif" class="full-img"></a>
            <a href="https://cafe.daum.net/policyfund/HhFz/791" class="project-banner" target="_blank"><img src="onestop.gif" class="full-img"></a>
            <a href="https://cafe.daum.net/policyfund/7GAA/913" class="project-banner" target="_blank"><img src="rnd.jpg" class="full-img"></a>
            <a href="https://goo.gl/forms/6U4SgcwlXWb836Qr2" class="project-banner" target="_blank"><img src="call.gif" class="full-img"></a>
            <div class="divider"></div>
            <div class="sub-btn-row">
                <a href="https://forms.gle/avJuU74KKV9HkQTx8" class="btn btn-sub btn-gift" target="_blank"><span class="icon">🎫</span>컨설팅 상품권 등록</a>
                <a href="http://gw.kotera.or.kr" class="btn btn-sub btn-gw" target="_blank"><span class="icon">🏢</span>그룹웨어 입장</a>
            </div>
        </div>
        <footer class="footer">
            <p>사단법인 한국기술개발협회 | 서울특별시 송파구 충민로 66 가든파이브라이프 T7109호</p>
            <p>TEL : 02-572-8520 | info@kotera.or.kr | 대표 : 최노아</p>
        </footer>
    </div>

    <div id="chat-circle">
        <span style="color:white; font-size:30px;">💬</span>
    </div>

    <div id="chat-box">
        <div style="background:#004a95; color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
            <span>KOTERA AI기업R&D지도사</span>
            <span id="chat-close" style="cursor:pointer; font-size:20px;">×</span>
        </div>
        <div id="chat-window" style="flex:1; overflow-y:auto; padding:15px; font-size:14px; background:#f9f9f9;">
            <div style="background:white; padding:10px; border-radius:10px; margin-bottom:10px; box-shadow:0 1px 2px rgba(0,0,0,0.05);">
                안녕하십니까? KOTERA AI전문위원입니다. 무엇을 도와드릴까요?
            </div>
        </div>
        <div style="padding:15px; border-top:1px solid #eee; display:flex; gap:5px; background:white;">
            <input type="text" id="user-input" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:5px; outline:none;" placeholder="질문을 입력하세요...">
            <button id="send-btn" style="padding:10px 15px; background:#004a95; color:white; border:none; border-radius:5px; cursor:pointer;">전송</button>
        </div>
    </div>

<script>
    const chatCircle = document.getElementById('chat-circle');
    const chatBox = document.getElementById('chat-box');
    const chatClose = document.getElementById('chat-close');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatWindow = document.getElementById('chat-window');

    // 1. 열기/닫기 (이벤트 리스너 방식으로 확실하게 연결)
    chatCircle.addEventListener('click', () => {
        chatBox.style.display = 'flex';
    });
    chatClose.addEventListener('click', () => {
        chatBox.style.display = 'none';
    });

    // 2. 메시지 전송
    async function sendMsg() {
        const msg = userInput.value.trim();
        if(!msg) return;

        chatWindow.innerHTML += `<div style="text-align:right; margin-bottom:10px;"><span style="background:#004a95; color:white; padding:8px 12px; border-radius:10px; display:inline-block;">${msg}</span></div>`;
        const loadingId = 'loading-' + Date.now();
        chatWindow.innerHTML += `<div id="${loadingId}" style="margin-bottom:10px;"><span style="background:#eee; padding:8px 12px; border-radius:10px; display:inline-block;">답변 대기 중...</span></div>`;
        userInput.value = '';
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch('https://genai-app-rd-1-808470621871.us-central1.run.app/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg})
            });
            const data = await response.json();
            document.getElementById(loadingId).remove();
            const aiAnswer = data.answer || "잠시 후 다시 시도해주세요.";
            chatWindow.innerHTML += `<div style="margin-bottom:10px;"><span style="background:white; padding:8px 12px; border-radius:10px; display:inline-block; border:1px solid #eee;"><b>AI:</b> ${aiAnswer}</span></div>`;
        } catch (e) {
            document.getElementById(loadingId).innerHTML = `<span style="color:red;">오류 발생.</span>`;
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMsg);
    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
